<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atmosphere — Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #0a0f1e;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8e4dc;
      --muted: rgba(232,228,220,0.45);
      --accent: #f0c060;
      --glow: rgba(240,192,96,0.18);
    }

    html, body {
      height: 100%;
      background: var(--sky);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* Animated sky background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(30,60,120,0.55) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(10,30,80,0.45) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(50,20,90,0.3) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Stars */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 10%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 65%, rgba(255,255,255,0.6) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 8s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 36px;
    }

    /* Header */
    .brand {
      text-align: center;
      animation: fadeDown 0.8s ease both;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-style: italic;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1;
    }

    .brand-sub {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Search */
    .search-wrap {
      width: 100%;
      max-width: 520px;
      animation: fadeDown 0.8s 0.1s ease both;
    }

    .search-row {
      display: flex;
      gap: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-row:focus-within {
      border-color: rgba(240,192,96,0.4);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #location-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 16px 20px;
      letter-spacing: 0.05em;
    }

    #location-input::placeholder { color: var(--muted); }

    #search-btn {
      background: var(--accent);
      border: none;
      color: #0a0f1e;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 16px 24px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #search-btn:hover { background: #f7d080; }
    #search-btn:active { transform: scale(0.97); }

    /* Error */
    .error-msg {
      color: #f07070;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    /* Weather Card */
    .weather-card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 40px;
      backdrop-filter: blur(20px);
      display: none;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .weather-card.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* Location header */
    .card-location {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .card-city {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      line-height: 1.1;
    }

    .card-country {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .card-localtime {
      text-align: right;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      line-height: 1.7;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 32px;
    }

    /* Main temp row */
    .main-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .weather-icon {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 12px rgba(240,192,96,0.3));
    }

    .temp-block {}

    .temp-value {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 4.5rem);
      line-height: 1;
      color: var(--accent);
    }

    .temp-unit {
      font-size: 1.2rem;
      color: var(--muted);
      vertical-align: super;
    }

    .condition-text {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .stat-cell {
      background: rgba(10,15,30,0.5);
      padding: 18px 20px;
    }

    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1rem;
      color: var(--text);
    }

    /* AQI bar */
    .aqi-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
    }

    .aqi-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .aqi-bar-wrap {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .aqi-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }

    .aqi-val {
      font-size: 0.75rem;
      white-space: nowrap;
      min-width: 60px;
      text-align: right;
    }

    /* Loader */
    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .loader.active { display: flex; }

    .loader-ring {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .weather-card { padding: 28px 22px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="brand">
    <div class="brand-name">Atmosphere</div>
    <div class="brand-sub">Real-time weather intelligence</div>
  </div>

  <div class="search-wrap">
    <div class="search-row">
      <input
        type="text"
        id="location-input"
        placeholder="Enter city, region, or coordinates…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="search-btn" onclick="fetchWeather()">Search</button>
    </div>
    <div class="error-msg" id="error-msg">Location not found. Please try again.</div>
  </div>

  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Fetching conditions…</div>
  </div>

  <div class="weather-card" id="weather-card">
    <div class="card-location">
      <div>
        <div class="card-city" id="city-name">—</div>
        <div class="card-country" id="country-name">—</div>
      </div>
      <div class="card-localtime">
        <div id="local-date">—</div>
        <div id="local-time">—</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="main-row">
      <img class="weather-icon" id="weather-icon" src="" alt="Weather icon"/>
      <div class="temp-block">
        <div class="temp-value">
          <span id="temp-c">—</span><span class="temp-unit">°C</span>
        </div>
        <div class="condition-text" id="condition-text">—</div>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:4px;">
          Feels like <span id="feels-like">—</span>°C
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="wind">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Visibility</div>
        <div class="stat-value" id="visibility">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="pressure">—</div>
      </div>
    </div>

    <div class="aqi-row">
      <div class="aqi-label">Air Quality</div>
      <div class="aqi-bar-wrap">
        <div class="aqi-bar-fill" id="aqi-bar" style="width:0%; background:#4caf50;"></div>
      </div>
      <div class="aqi-val" id="aqi-val">—</div>
    </div>
  </div>

</div>

<script>
  const API_KEY = '13bf86c705774e33849145635263004';

  const input      = document.getElementById('location-input');
  const errorMsg   = document.getElementById('error-msg');
  const loader     = document.getElementById('loader');
  const card       = document.getElementById('weather-card');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchWeather(); });

  async function fetchWeather() {
    const location = input.value.trim();
    if (!location) return;

    errorMsg.style.display = 'none';
    card.classList.remove('visible');
    card.style.display = 'none';
    loader.classList.add('active');

    try {
      const url = `https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${encodeURIComponent(location)}&aqi=yes`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();
      renderWeather(data);
    } catch (err) {
      errorMsg.style.display = 'block';
    } finally {
      loader.classList.remove('active');
    }
  }

  function renderWeather(data) {
    const loc  = data.location;
    const cur  = data.current;
    const aqi  = cur.air_quality;

    // Location
    document.getElementById('city-name').textContent    = loc.name;
    document.getElementById('country-name').textContent = `${loc.region ? loc.region + ', ' : ''}${loc.country}`;

    // Local time
    const lt = loc.localtime.split(' ');
    document.getElementById('local-date').textContent = formatDate(lt[0]);
    document.getElementById('local-time').textContent = lt[1];

    // Icon & condition
    document.getElementById('weather-icon').src = 'https:' + cur.condition.icon;
    document.getElementById('weather-icon').alt = cur.condition.text;
    document.getElementById('condition-text').textContent = cur.condition.text;

    // Temp
    document.getElementById('temp-c').textContent    = Math.round(cur.temp_c);
    document.getElementById('feels-like').textContent = Math.round(cur.feelslike_c);

    // Stats
    document.getElementById('humidity').textContent   = cur.humidity + '%';
    document.getElementById('wind').textContent       = cur.wind_kph + ' km/h ' + cur.wind_dir;
    document.getElementById('visibility').textContent = cur.vis_km + ' km';
    document.getElementById('pressure').textContent   = cur.pressure_mb + ' mb';

    // AQI
    if (aqi && aqi['us-epa-index']) {
      const idx = aqi['us-epa-index'];
      const aqiInfo = getAqiInfo(idx);
      const fillPct = Math.min((idx / 6) * 100, 100);
      document.getElementById('aqi-bar').style.width      = fillPct + '%';
      document.getElementById('aqi-bar').style.background = aqiInfo.color;
      document.getElementById('aqi-val').textContent      = aqiInfo.label;
      document.getElementById('aqi-val').style.color      = aqiInfo.color;
    } else {
      document.getElementById('aqi-val').textContent = 'N/A';
    }

    // Show card
    card.style.display = 'block';
    requestAnimationFrame(() => card.classList.add('visible'));
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  }

  function getAqiInfo(idx) {
    const map = {
      1: { label: 'Good',            color: '#4caf50' },
      2: { label: 'Moderate',        color: '#ffeb3b' },
      3: { label: 'Unhealthy (Sens)',color: '#ff9800' },
      4: { label: 'Unhealthy',       color: '#f44336' },
      5: { label: 'Very Unhealthy',  color: '#9c27b0' },
      6: { label: 'Hazardous',       color: '#7b1e1e' },
    };
    return map[idx] || { label: 'Unknown', color: '#888' };
  }
</script>
</body>
        </html>
